<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Ronin</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="img/favicon.webp" type="image/x-icon">
    <!-- Load Tailwind CSS -->
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans text-gray-900">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md my-8">
        
        <!-- ========================================== -->
        <!-- STATE 1: VALID LINK (SHOW FORM)            -->
        <!-- ========================================== -->
        <div id="valid-link-section" class="hidden">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800">Set New Password</h2>
                <p class="text-gray-500 text-sm mt-2">Please enter your new password below.</p>
            </div>

            <!-- Alert Box for Backend Errors -->
            <div id="alert-box" class="hidden mb-4 p-3 rounded-lg text-sm text-red-700 bg-red-100 border border-red-200"></div>

            <form id="resetConfirmForm" class="space-y-5" novalidate>
                <!-- New Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <input type="password" id="password" placeholder="••••••••" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                    <input type="password" id="confirm_password" placeholder="••••••••" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    <p id="error-password" class="text-red-500 text-xs mt-1 hidden">Passwords do not match.</p>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors shadow-sm flex justify-center items-center">
                    <span>Change Password</span>
                </button>
            </form>
        </div>

        <!-- ========================================== -->
        <!-- STATE 2: INVALID LINK (HIDDEN BY DEFAULT)  -->
        <!-- ========================================== -->
        <div id="invalid-link-section" class="hidden text-center">
            <div class="flex justify-center mb-4">
                <div class="bg-red-50 p-4 rounded-full border border-red-100">
                    <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Invalid or Expired Link</h2>
            <p class="text-gray-600 mb-8">The password reset link is invalid, possibly because it has already been used or expired. Please request a new one.</p>
            
            <a href="forgot-password.html" class="inline-block w-full bg-gray-900 hover:bg-gray-800 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors shadow-sm">
                Request New Link
            </a>
        </div>

    </div>

    <!-- JavaScript Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Extract UID and Token from the URL (e.g. ?uid=...&token=...)
            const urlParams = new URLSearchParams(window.location.search);
            const uid = urlParams.get('uid');
            const token = urlParams.get('token');

            const validSection = document.getElementById("valid-link-section");
            const invalidSection = document.getElementById("invalid-link-section");

            // 2. Check if the link has the required security pieces
            if (!uid || !token) {
                invalidSection.classList.remove("hidden");
            } else {
                validSection.classList.remove("hidden");
            }

            // 3. Handle Form Submission
            const form = document.getElementById("resetConfirmForm");
            const alertBox = document.getElementById("alert-box");
            const submitBtn = document.getElementById("submitBtn");
            const passInput = document.getElementById("password");
            const confInput = document.getElementById("confirm_password");
            const passError = document.getElementById("error-password");

            form.addEventListener("submit", function(e) {
                e.preventDefault();
                alertBox.classList.add("hidden");
                passError.classList.add("hidden");

                const password = passInput.value;
                const confirmPassword = confInput.value;

                // Validate matching passwords
                if (password !== confirmPassword) {
                    passError.classList.remove("hidden");
                    confInput.classList.add("border-red-500", "focus:ring-red-500");
                    return;
                } else {
                    confInput.classList.remove("border-red-500", "focus:ring-red-500");
                }

                // Show loading state
                submitBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg> Saving...`;
                submitBtn.disabled = true;

                // 4. Fetch CSRF Token & Send to Django API
                fetch("http://localhost:8000/api/users/csrf/", {
                    method: "GET",
                    credentials: "include" 
                })
                .then(res => res.json())
                .then(csrfData => {
                    return fetch("http://localhost:8000/api/users/password-reset-confirm-api/", {
                        method: "POST",
                        headers: { 
                            "Content-Type": "application/json",
                            "X-CSRFToken": csrfData.csrfToken
                        },
                        // We send the passwords AND the url tokens back to Django!
                        body: JSON.stringify({
                            uid: uid,
                            token: token,
                            new_password: password
                        }),
                        credentials: "include"
                    });
                })
                .then(res => res.json())
                .then(result => {
                    if (result.success) {
                        // Success! Redirect to login page
                        alert("Password successfully reset! Please log in.");
                        window.location.href = "login.html";
                    } else {
                        // Token might have expired
                        alertBox.textContent = result.error || "Failed to reset password. The link may be expired.";
                        alertBox.classList.remove("hidden");
                    }
                })
                .catch(err => {
                    console.error("Fetch error:", err);
                    alertBox.textContent = "Cannot connect to server.";
                    alertBox.classList.remove("hidden");
                })
                .finally(() => {
                    submitBtn.innerHTML = `<span>Change Password</span>`;
                    submitBtn.disabled = false;
                });
            });
        });
    </script>
</body>
</html>
