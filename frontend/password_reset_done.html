<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Inbox - Ronin</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="img/favicon.webp" type="image/x-icon">
    <!-- Load Tailwind CSS -->
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans text-gray-900">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md my-8 text-center">
        
        <!-- Animated / Highlighted Icon -->
        <div class="flex justify-center mb-6">
            <div class="bg-green-50 p-4 rounded-full border border-green-100">
                <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
            </div>
        </div>
        
        <!-- Text Content -->
        <h2 class="text-3xl font-bold text-gray-800 mb-4">Check your inbox</h2>
        
        <p class="text-gray-600 mb-4 leading-relaxed">
            We've emailed you instructions for setting your password, if an account exists with the email you entered. You should receive them shortly.
        </p>
        
        <p class="text-sm text-gray-500 mb-8 px-2">
            If you don't receive an email, please make sure you've entered the address you registered with, and check your spam folder.
        </p>
        
        <!-- Return Button -->
        <a href="https://ronin-pk-landing-page-clone.vercel.app/login.html" class="inline-block w-full bg-gray-900 hover:bg-gray-800 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors shadow-sm">
            Return to Login
        </a>
        
    </div>

</body>
</html>
