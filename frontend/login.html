<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Ronin</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="img/favicon.webp" type="image/x-icon">
    <!-- Load Tailwind CSS -->
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans text-gray-900">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md my-8">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
            <p class="text-gray-500 text-sm mt-2">Sign in to your Ronin account.</p>
        </div>

        <!-- Alert Box for Backend Errors (Hidden by default) -->
        <div id="alert-box" class="hidden mb-4 p-3 rounded-lg text-sm text-red-700 bg-red-100 border border-red-200"></div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-5" novalidate>
            
            <!-- Email Field -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Username or Email</label>
                <input type="text" id="login_field" placeholder="name or name@example.com" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                <p id="error-login_field" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <!-- Password Field with Eye Icon -->
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <a href="https://ronin-pk-landing-page-clone.vercel.app/forget_password.html" class="text-xs text-blue-600 hover:text-blue-800 font-medium">Forgot password?</a>
                </div>
                <div class="relative">
                    <input type="password" id="password" placeholder="••••••••" 
                        class="w-full px-4 py-2 pr-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    
                    <!-- Eye Button -->
                    <button type="button" class="toggle-password absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-700 focus:outline-none">
                        <!-- Eye Open -->
                        <svg class="eye-open h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <!-- Eye Closed -->
                        <svg class="eye-closed h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                        </svg>
                    </button>
                </div>
                <p id="error-password" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors shadow-sm flex justify-center items-center">
                <span>Sign In</span>
            </button>

        </form>

        <!-- Social Login Divider -->
        <div class="flex items-center my-6">
            <div class="border-t border-gray-300 flex-grow"></div>
            <div class="px-4 text-gray-500 text-sm font-medium">Or continue with</div>
            <div class="border-t border-gray-300 flex-grow"></div>
        </div>

        <!-- Social Login Buttons -->
        <div class="space-y-3">
            <!-- Google Button -->
            <a href="https://ronin-pk-landing-page-clone-production.up.railway.app/accounts/google/login/" 
                class="w-full flex items-center justify-center px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm bg-white hover:bg-gray-50 text-gray-700 font-medium transition-colors">
                <svg class="h-5 w-5 mr-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </a>

           
        </div>

        <!-- Register Link -->
        <div class="mt-8 text-center text-sm">
            <span class="text-gray-600">Don't have an account?</span> 
            <a href="https://ronin-pk-landing-page-clone.vercel.app/register.html" class="text-blue-600 hover:text-blue-800 font-semibold transition-colors">Create one here</a>
        </div>

    </div>

    <!-- JavaScript Logic -->
    <script>
        // ==========================================
        // 1. EYE ICON TOGGLE LOGIC
        // ==========================================
        document.querySelector('.toggle-password').addEventListener('click', function() {
            const input = this.previousElementSibling;
            const eyeOpen = this.querySelector('.eye-open');
            const eyeClosed = this.querySelector('.eye-closed');

            if (input.type === 'password') {
                input.type = 'text';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
        });

        // ==========================================
        // 2. FORM VALIDATION & SUBMISSION
        // ==========================================
        const form = document.getElementById("loginForm");
        const alertBox = document.getElementById("alert-box");
        const submitBtn = document.getElementById("submitBtn");

        // Helper: Set Field Error (Red borders)
        function setFieldError(fieldId, message) {
            const input = document.getElementById(fieldId);
            const errorMsg = document.getElementById(`error-${fieldId}`);
            
            input.classList.remove('border-gray-300', 'focus:ring-blue-500', 'focus:border-blue-500');
            input.classList.add('border-red-500', 'focus:ring-red-500', 'focus:border-red-500');
            
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
        }

        // Helper: Reset Field Error (Normal borders)
        function resetFieldError(fieldId) {
            const input = document.getElementById(fieldId);
            const errorMsg = document.getElementById(`error-${fieldId}`);
            
            input.classList.add('border-gray-300', 'focus:ring-blue-500', 'focus:border-blue-500');
            input.classList.remove('border-red-500', 'focus:ring-red-500', 'focus:border-red-500');
            
            errorMsg.classList.add('hidden');
        }
            form.addEventListener("submit", function(e) {
            e.preventDefault(); 
            alertBox.classList.add("hidden"); 

            let isValid = true;      
            
            // 1. Grab values using the correct IDs
            const loginIdValue = document.getElementById("login_field").value.trim();
            const passwordValue = document.getElementById("password").value;

            // 2. Check Username/Email (Removed the @ symbol check so usernames work!)
            if (loginIdValue === "") {
                setFieldError("login_field", "Please enter your username or email.");
                isValid = false;
            } else {
                resetFieldError("login_field");
            }

            // 3. Check Password
            if (passwordValue === "") {
                setFieldError("password", "Please enter your password.");
                isValid = false;
            } else {
                resetFieldError("password");
            }

            if (!isValid) return; 

            // Loading state
            submitBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg> Signing in...`;
            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-70", "cursor-not-allowed");

            // 1. FIRST, Ask Django for the CSRF Token
            fetch("https://ronin-pk-landing-page-clone-production.up.railway.app/api/users/csrf/", {
                method: "GET",
                credentials: "include" 
            })
            .then(res => res.json())
            .then(csrfData => {
                const csrfToken = csrfData.csrfToken; 

                // 2. NOW, send the actual Login request
                return fetch("https://ronin-pk-landing-page-clone-production.up.railway.app/api/users/login/", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "X-CSRFToken": csrfToken   // <-- Token included!
                    },
                    body: JSON.stringify({
                        email: loginIdValue, // Django checks this field for either email or username
                        password: passwordValue
                    }),
                    credentials: "include" // <--- CRITICAL: This was missing! It saves your login cookie!
                })
                .then(res => res.json())
                .then(result => {
                    if (result.success) {
                        window.location.href = "profile.html";
                    } else {
                        alertBox.textContent = result.error || "Invalid credentials. Please try again.";
                        alertBox.classList.remove("hidden");
                    }
                });
            })
            .catch(err => {
                console.error("Fetch error:", err);
                alertBox.textContent = "Cannot connect to server. Please ensure backend is running.";
                alertBox.classList.remove("hidden");
            })
            .finally(() => {
                submitBtn.innerHTML = `<span>Sign In</span>`;
                submitBtn.disabled = false;
                submitBtn.classList.remove("opacity-70", "cursor-not-allowed");
            });
        });

    
    </script>
</body>
</html>
