<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Ronin</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="img/favicon.webp" type="image/x-icon">
    <!-- Load Tailwind CSS -->
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans text-gray-900">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md my-8">
        <!-- Back to Home Button -->
<div class="mb-6 flex justify-end ">
    <a href="https://ronin-pk-landing-page-clone.vercel.app/index.html" class="inline-flex items-center text-sm font-medium text-gray-500 hover:text-blue-600 transition-colors">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Back to Home
    </a>
</div>
        
        <!-- Header -->
        <div class="flex items-center space-x-4 mb-8">
            <!-- Profile Avatar Placeholder -->
            <div class="h-16 w-16 bg-blue-600 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-md">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-gray-800">My Profile</h2>
                <p class="text-gray-500 text-sm">Update your account details</p>
            </div>
        </div>

        <!-- Alert Boxes (Hidden by default) -->
        <div id="alert-error" class="hidden mb-6 p-3 rounded-lg text-sm text-red-700 bg-red-100 border border-red-200"></div>
        <div id="alert-success" class="hidden mb-6 p-3 rounded-lg text-sm text-green-700 bg-green-100 border border-green-200 shadow-sm items-center">
            <span id="success-message">Profile updated successfully!</span>
        </div>

        <!-- Profile Form -->
        <form id="profileForm" class="space-y-5" novalidate>
            
            <!-- Username Field -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" placeholder="Loading..." required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-gray-50 focus:bg-white">
                <p id="error-username" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <!-- Email Field -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Loading..." required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-gray-50 focus:bg-white">
                <p id="error-email" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-all mt-4 shadow-sm flex justify-center items-center">
                <span>Save Changes</span>
            </button>

        </form>

        <!-- Logout Link -->
        <div class="mt-6 text-center text-sm border-t pt-6">
            <a href="#" id="logoutBtn" class="text-red-500 hover:text-red-700 font-medium transition-colors">Sign out of your account</a>
        </div>

    </div>

    <!-- ============================================================================================================================== -->


        <!-- Logout Confirmation Modal (Hidden by default) -->
    <div id="logoutModal" class="hidden mt-40 fixed inset-0 z-50 items-center justify-center overflow-x-hidden overflow-y-auto outline-none focus:outline-none">
        <!-- Backdrop -->
        <div class="fixed inset-0 bg-black opacity-50"></div>
        
        <!-- Modal Content -->
        <div class="relative w-full max-w-md p-6 mx-auto bg-white rounded-2xl shadow-xl z-50 transform transition-all">
            <div class="text-center">
                <!-- Warning Icon -->
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-6">
                    <svg class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </div>
                
                <h3 class="text-xl font-bold text-gray-900 mb-2">Sign Out</h3>
                <p class="text-gray-500 mb-8">Are you sure you want to sign out of your account? You will need to log back in to access your profile.</p>
                
                <!-- Buttons -->
                <div class="flex items-center justify-center gap-4">
                    <button id="cancelLogoutBtn" type="button" class="w-full px-4 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-200 transition-colors">
                        Cancel
                    </button>
                    <button id="confirmLogoutBtn" type="button" class="w-full px-4 py-2.5 text-sm font-medium text-white bg-red-600 border border-transparent rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors">
                        Yes, Sign Out
                    </button>
                </div>
            </div>
        </div>
    </div>




<!-- ====================================================================================================================================================== -->
    <!-- JavaScript Logic -->
    <script>
        const form = document.getElementById("profileForm");
        const alertError = document.getElementById("alert-error");
        const alertSuccess = document.getElementById("alert-success");
        const submitBtn = document.getElementById("submitBtn");

        // The URL of your Django API
        const API_URL = "https://ronin-pk-landing-page-clone-production.up.railway.app/api/users/profile/";

        // ----------------------------------------------------
        // 1. FETCH DATA ON PAGE LOAD
        // ----------------------------------------------------
        document.addEventListener("DOMContentLoaded", function() {
            fetch(API_URL, {
                method: "GET",
                credentials: "include" // Proves who you are
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Populate the inputs with data from the database
                    document.getElementById("username").value = data.data.username;
                    document.getElementById("email").value = data.data.email;
                } else {
                    // User is probably not logged in
                    showTopError("You are not logged in. Please sign in first.");
                    setTimeout(() => window.location.href = "login.html", 2000);
                }
            })
            .catch(err => {
                console.error("Fetch error:", err);
                showTopError("Could not connect to the server.");
            });
        });

        // ----------------------------------------------------
        // 2. UI HELPER FUNCTIONS
        // ----------------------------------------------------
        function showTopError(message) {
            alertSuccess.classList.add("hidden");
            alertError.textContent = message;
            alertError.classList.remove("hidden");
        }

        function setFieldError(fieldId, message) {
            const input = document.getElementById(fieldId);
            const errorMsg = document.getElementById(`error-${fieldId}`);
            input.classList.remove('border-gray-300', 'focus:ring-blue-500', 'focus:border-blue-500');
            input.classList.add('border-red-500', 'focus:ring-red-500', 'focus:border-red-500');
            errorMsg.textContent = message;
            errorMsg.classList.remove('hidden');
        }

        function resetFieldError(fieldId) {
            const input = document.getElementById(fieldId);
            const errorMsg = document.getElementById(`error-${fieldId}`);
            input.classList.add('border-gray-300', 'focus:ring-blue-500', 'focus:border-blue-500');
            input.classList.remove('border-red-500', 'focus:ring-red-500', 'focus:border-red-500');
            errorMsg.classList.add('hidden');
        }

        // ----------------------------------------------------
        // 3. HANDLE FORM SUBMISSION
        // ----------------------------------------------------
        form.addEventListener("submit", function(e) {
            e.preventDefault(); 
            alertError.classList.add("hidden"); 
            alertSuccess.classList.add("hidden");

            let isValid = true;
            const fields = ['username', 'email'];

            // Validate empty fields
            fields.forEach(field => {
                if (document.getElementById(field).value.trim() === "") {
                    setFieldError(field, "This field cannot be empty.");
                    isValid = false;
                } else {
                    resetFieldError(field);
                }
            });

            if (!isValid) return;

            // Change button to show loading state
            submitBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg> Saving...`;
            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-70", "cursor-not-allowed");

            // Pack up the data
            const formData = new FormData(form);

            // 1. FIRST, Fetch CSRF Token!
            fetch("https://ronin-pk-landing-page-clone-production.up.railway.app/api/users/csrf/", {
                method: "GET",
                credentials: "include" 
            })
            .then(res => res.json())
            .then(csrfData => {
                const csrfToken = csrfData.csrfToken;

                // 2. NOW send the Profile Data with the token in the Headers!
                return fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": csrfToken // <--- THIS FIXES THE ERROR!
                    },
                    body: formData,
                    credentials: "include" 
                })
                .then(res => res.json())
                .then(result => {
                    if (result.success) {
                        // Show beautiful success message
                        alertSuccess.classList.remove("hidden");
                        
                        // Update input boxes just in case backend cleaned the data
                        if (result.data) {
                            document.getElementById("username").value = result.data.username;
                            document.getElementById("email").value = result.data.email;
                        }
                    } else {
                        // Show field specific errors
                        if (result.errors) {
                            for (const [field, messages] of Object.entries(result.errors)) {
                                if (document.getElementById(field)) {
                                    setFieldError(field, messages[0]);
                                } else {
                                    showTopError(messages[0]);
                                }
                            }
                        } else if (result.error) {
                            showTopError(result.error);
                        }
                    }
                });
            })
            .catch(err => {
                console.error("Fetch error:", err);
                showTopError("Cannot connect to server. Please ensure backend is running.");
            })
            .finally(() => {
                // Return button to normal state
                submitBtn.innerHTML = `<span>Save Changes</span>`;
                submitBtn.disabled = false;
                submitBtn.classList.remove("opacity-70", "cursor-not-allowed");
            });
        })

        // ----------------------------------------------------
        // LOGOUT MODAL LOGIC
        // ----------------------------------------------------
        const logoutBtn = document.getElementById("logoutBtn");
        const logoutModal = document.getElementById("logoutModal");
        const cancelLogoutBtn = document.getElementById("cancelLogoutBtn");
        const confirmLogoutBtn = document.getElementById("confirmLogoutBtn");

        if (logoutBtn && logoutModal) {
            // 1. Show the modal when "Sign Out" is clicked
            logoutBtn.addEventListener("click", function(e) {
                e.preventDefault();
                logoutModal.classList.remove("hidden");
            });

            // 2. Hide the modal when "Cancel" is clicked
            cancelLogoutBtn.addEventListener("click", function() {
                logoutModal.classList.add("hidden");
            });

            // 3. Perform the actual logout when "Yes, Sign Out" is clicked
            confirmLogoutBtn.addEventListener("click", function() {
                // Optional: Change button text to show it's working
                confirmLogoutBtn.innerHTML = "Signing out...";
                confirmLogoutBtn.disabled = true;

                fetch("https://ronin-pk-landing-page-clone-production.up.railway.app/api/users/logout/", {
                    method: "GET",
                    credentials: "include",
                    cache: "no-store"
                })
                .then(res => res.json())
                .then(data => {
                    // Successfully logged out, redirect to login page
                    window.location.href = "index.html";
                })
                .catch(err => {
                    console.error("Logout failed:", err);
                    // Even if it fails, redirect to login to be safe
                    window.location.href = "index.html";
                });
            });
        }


    </script>
</body>
</html>
