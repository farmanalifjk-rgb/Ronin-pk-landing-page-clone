<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Ronin</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="img/favicon.webp" type="image/x-icon">
    <!-- Load Tailwind CSS -->
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans text-gray-900">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md my-8">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Forgot Password?</h2>
            <p class="text-gray-500 text-sm mt-2">Enter your email address and we will send you a link to reset your password.</p>
        </div>

        <!-- Alert Box (Hidden by default) -->
        <div id="alert-box" class="hidden mb-6 p-3 rounded-lg text-sm text-center"></div>

        <!-- Form -->
        <form id="forgotPasswordForm" class="space-y-5" novalidate>
            
            <!-- Email Field -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                <p id="error-email" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" id="submitBtn"
                class="w-full bg-gray-900 hover:bg-gray-800 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors shadow-sm flex justify-center items-center">
                <span>Send Reset Link</span>
            </button>

        </form>
        
        <!-- Back to Login Link -->
        <div class="mt-8 text-center text-sm">
            <a href="https://ronin-pk-landing-page-clone.vercel.app/login.html" class="text-blue-600 hover:text-blue-800 font-semibold transition-colors flex items-center justify-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Login
            </a>
        </div>

    </div>

    
        <script>
        const form = document.getElementById("forgotPasswordForm");
        const alertBox = document.getElementById("alert-box");
        const submitBtn = document.getElementById("submitBtn");
        const emailInput = document.getElementById("email");
        const emailError = document.getElementById("error-email");

        form.addEventListener("submit", function(e) {
            e.preventDefault(); 
            alertBox.classList.add("hidden"); 
            
            const email = emailInput.value.trim();

            // Simple Validation
            if (email === "" || !/\S+@\S+\.\S+/.test(email)) {
                emailInput.classList.add('border-red-500', 'focus:ring-red-500');
                emailError.textContent = "Please enter a valid email address.";
                emailError.classList.remove('hidden');
                return;
            } else {
                emailInput.classList.remove('border-red-500', 'focus:ring-red-500');
                emailError.classList.add('hidden');
            }

            // Show Loading State
            submitBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg> Sending...`;
            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-70", "cursor-not-allowed");

            // 1. Get CSRF Token
            fetch("https://ronin-pk-landing-page-clone-production.up.railway.app/api/users/csrf/", {
                method: "GET",
                credentials: "include" 
            })
            .then(res => res.json())
            .then(csrfData => {
                const csrfToken = csrfData.csrfToken; 

                // 2. Send Email to Django Password Reset API
                return fetch("https://ronin-pk-landing-page-clone-production.up.railway.app/api/users/password-reset/", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "X-CSRFToken": csrfToken
                    },
                    body: JSON.stringify({ email: email }),
                    credentials: "include"
                })
                .then(res => res.json())
                .then(result => {
                    if (result.success) {
                        // Redirect to the success page!
                        window.location.href = "password_reset_done.html";
                    } else {
                        alertBox.textContent = result.error || "Something went wrong.";
                        alertBox.className = "mb-6 p-3 rounded-lg text-sm text-center text-red-700 bg-red-100 border border-red-200";
                        alertBox.classList.remove("hidden");
                    }
                });
            })
            .catch(err => {
                console.error("Fetch error:", err);
                alertBox.textContent = "Cannot connect to server.";
                alertBox.className = "mb-6 p-3 rounded-lg text-sm text-center text-red-700 bg-red-100 border border-red-200";
                alertBox.classList.remove("hidden");
            })
            .finally(() => {
                // Reset Button
                submitBtn.innerHTML = `<span>Send Reset Link</span>`;
                submitBtn.disabled = false;
                submitBtn.classList.remove("opacity-70", "cursor-not-allowed");
            });
        });
    </script>


</body>
</html>
